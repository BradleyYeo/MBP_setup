---
# Dotfiles configuration
dotfiles_repo: https://github.com/BradleyYeo/dotfiles
dotfiles_repo_local_destination: ~/repositories/dotfiles
dotfiles_files:
  - .zshrc
  - .gitignore
  - .gitconfig
  - .githelpers
  - .inputrc
  - .macos
  - .vimrc
  - .aerospace.toml
  - .gemini

# Homebrew configuration (optional, most apps are in Brewfile)
homebrew_cask_appdir: /Applications

# Repositories to clone
github_repos_to_clone:
  - repo: "BradleyYeo/Obsidian"
    dest: "~/Documents/Personal"
  - repo: "BradleyYeo/Work"
    dest: "~/Documents/Work"
  - repo: "BradleyYeo/Visualise_Value"
    dest: "~/Documents/Visualise_Value"
