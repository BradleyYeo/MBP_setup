---
- name: Ensure Documents directory exists
  ansible.builtin.file:
    path: ~/Documents
    state: directory

- name: Clone private repositories using GitHub CLI
  # Using `creates` ensures this only runs if the directory doesn't exist, making it idempotent
  ansible.builtin.command:
    cmd: "gh repo clone {{ item.repo }} {{ item.dest }}"
    creates: "{{ item.dest }}"
  loop: "{{ github_repos_to_clone }}"

- name: Pull latest changes for existing repositories
  ansible.builtin.command:
    cmd: "git pull"
    chdir: "{{ item.dest }}"
  loop: "{{ github_repos_to_clone }}"
  register: git_pull_result
  changed_when: "'Already up to date.' not in git_pull_result.stdout"
  ignore_errors: true

- name: Install all project dependencies
  ansible.builtin.pip:
    requirements: "{{ playbook_dir }}/requirements.txt"
    
- name: Sync wallpapers from Object Storage
  amazon.aws.s3_object:
    bucket: wallpapers
    object: "/wallpapers/{{ item }}"
    dest: "~/Documents/Wallpapers/{{ item }}"
    mode: get
    # Use environment variables for secrets, never hardcode!
    access_key: "{{ lookup('env', 'AWS_ACCESS_KEY') }}"
    secret_key: "{{ lookup('env', 'AWS_SECRET_KEY') }}"
    endpoint_url: https://346e5692ae2024c494ef5f58c36fae37.r2.cloudflarestorage.com
  loop:
    - Adversity-Prosperity.jpeg
    - Assemble.jpeg
    - Bad Decisions.png
    - Caterpillar.jpeg
    - Compound_your_interest.png
    - Days.png
    - DoLess.png
    - Excellence.jpeg
    - Experience.jpeg
    - Goggins.jpeg
    - Improvement.png
    - Luck.png
    - Pain.jpeg
    - Pointless.jpeg
